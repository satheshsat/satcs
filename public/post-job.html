<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post Job - JobBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Jobs</a>
        <a class="nav-link" href="my-jobs.html">My Jobs</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow">
          <div class="card-body p-4">
            <h4 class="card-title mb-4"><i class="bi bi-plus-circle"></i> Post a Job</h4>
            <div id="alertBox" class="alert d-none" role="alert"></div>
            <form id="jobForm">
              <div class="mb-3">
                <label class="form-label">Job Title *</label>
                <input type="text" class="form-control" name="title" required placeholder="e.g. Senior Developer">
              </div>
              <div class="mb-3">
                <label class="form-label">Company *</label>
                <input type="text" class="form-control" name="company" required placeholder="Company name" id="companyInput">
              </div>
              <div class="mb-3">
                <label class="form-label">Description *</label>
                <textarea class="form-control" name="description" rows="5" required placeholder="Job description and requirements..."></textarea>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Location</label>
                  <input type="text" class="form-control" name="location" placeholder="City or Remote">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Job Type</label>
                  <select class="form-select" name="type">
                    <option value="full-time">Full-time</option>
                    <option value="part-time">Part-time</option>
                    <option value="contract">Contract</option>
                    <option value="internship">Internship</option>
                  </select>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Salary (optional)</label>
                <input type="text" class="form-control" name="salary" placeholder="e.g. $80k - $120k">
              </div>
              <div class="mb-3">
                <label class="form-label">Skills (comma separated)</label>
                <input type="text" class="form-control" name="skills" placeholder="JavaScript, React, Node.js">
              </div>
              <button type="submit" class="btn btn-primary">Post Job</button>
              <a href="my-jobs.html" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!redirectIfNotLoggedIn() || !redirectIfNotEmployer()) {}
    const user = getCurrentUser();
    if (user && user.company) document.getElementById('companyInput').value = user.company;
    document.getElementById('jobForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const skills = (fd.get('skills') || '').split(',').map(s => s.trim()).filter(Boolean);
      try {
        await api('/jobs', {
          method: 'POST',
          body: JSON.stringify({
            title: fd.get('title'),
            company: fd.get('company'),
            description: fd.get('description'),
            location: fd.get('location'),
            type: fd.get('type'),
            salary: fd.get('salary'),
            skills
          })
        });
        showAlert('alertBox', 'Job posted successfully.');
        e.target.reset();
        setTimeout(() => { window.location.href = 'my-jobs.html'; }, 1500);
      } catch (err) {
        showAlert('alertBox', err.message, true);
      }
    };
  </script>
</body>
</html>
