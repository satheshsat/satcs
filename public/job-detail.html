<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Detail - JobBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
      <a class="nav-link text-white" href="index.html">Back to Jobs</a>
    </div>
  </nav>

  <main class="container py-4">
    <div id="alertBox" class="alert d-none" role="alert"></div>
    <div id="content">
      <div class="text-center py-5 text-muted">Loading...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (!id) { document.getElementById('content').innerHTML = '<div class="alert alert-warning">Job not specified.</div>'; }
    else {
      api('/jobs/' + id)
        .then(job => {
          const postedBy = job.postedBy || {};
          document.getElementById('content').innerHTML = `
            <div class="card shadow">
              <div class="card-body p-4">
                <span class="badge bg-primary mb-2">${job.type || 'full-time'}</span>
                <h2 class="card-title">${escapeHtml(job.title)}</h2>
                <p class="text-muted mb-2"><i class="bi bi-building"></i> ${escapeHtml(job.company)}</p>
                ${job.location ? `<p class="text-muted mb-2"><i class="bi bi-geo-alt"></i> ${escapeHtml(job.location)}</p>` : ''}
                ${job.salary ? `<p class="text-muted mb-2"><i class="bi bi-cash"></i> ${escapeHtml(job.salary)}</p>` : ''}
                <p class="small text-muted">Posted ${formatDate(job.createdAt)}</p>
                <hr>
                <div class="mb-4">${escapeHtml(job.description).replace(/\n/g, '<br>')}</div>
                ${job.skills && job.skills.length ? '<p><strong>Skills:</strong> ' + job.skills.map(s => '<span class="badge bg-light text-dark me-1">' + escapeHtml(s) + '</span>').join('') + '</p>' : ''}
                <hr>
                <p class="small text-muted mb-0"><strong>Contact:</strong> ${escapeHtml(postedBy.name || '')} ${postedBy.email ? ' &middot; ' + escapeHtml(postedBy.email) : ''}</p>
              </div>
            </div>
          `;
        })
        .catch(e => {
          document.getElementById('content').innerHTML = '<div class="alert alert-danger">' + escapeHtml(e.message) + '</div>';
        });
    }
    function escapeHtml(s) {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
