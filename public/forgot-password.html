<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - JobBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body p-4">
            <h4 class="card-title mb-4"><i class="bi bi-key"></i> Forgot Password</h4>
            <p class="text-muted small">Enter your email and we'll send you a link to reset your password.</p>
            <div id="alertBox" class="alert d-none" role="alert"></div>
            <form id="forgotForm">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required placeholder="you@example.com">
              </div>
              <button type="submit" class="btn btn-primary w-100">Send reset link</button>
            </form>
            <p class="mt-3 mb-0 text-center text-muted small"><a href="login.html">Back to login</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (getToken()) window.location.href = 'index.html';
    document.getElementById('forgotForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = new FormData(e.target).get('email');
      try {
        await api('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email })
        });
        showAlert('alertBox', 'If an account exists with this email, you will receive a reset link. Check your inbox.', false);
        e.target.reset();
      } catch (err) {
        showAlert('alertBox', err.message, true);
      }
    };
  </script>
</body>
</html>
