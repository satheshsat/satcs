<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - JobBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body p-4">
            <h4 class="card-title mb-4"><i class="bi bi-lock"></i> Set new password</h4>
            <div id="alertBox" class="alert d-none" role="alert"></div>
            <form id="resetForm">
              <input type="hidden" name="token" id="tokenInput">
              <div class="mb-3">
                <label class="form-label">New password (min 6 characters)</label>
                <input type="password" class="form-control" name="password" required minlength="6" placeholder="••••••••">
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm password</label>
                <input type="password" class="form-control" name="confirm" required minlength="6" placeholder="••••••••">
              </div>
              <button type="submit" class="btn btn-primary w-100">Reset password</button>
            </form>
            <p class="mt-3 mb-0 text-center text-muted small"><a href="login.html">Back to login</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const tokenInput = document.getElementById('tokenInput');
    if (!token) {
      document.getElementById('alertBox').className = 'alert alert-warning';
      document.getElementById('alertBox').textContent = 'Invalid reset link. Use the link from your email or request a new one.';
      document.getElementById('alertBox').classList.remove('d-none');
      document.getElementById('resetForm').style.display = 'none';
    } else {
      tokenInput.value = token;
    }
    document.getElementById('resetForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const password = fd.get('password');
      const confirm = fd.get('confirm');
      if (password !== confirm) {
        showAlert('alertBox', 'Passwords do not match.', true);
        return;
      }
      try {
        await api('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token: fd.get('token'), password })
        });
        showAlert('alertBox', 'Password updated. Redirecting to login...', false);
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        showAlert('alertBox', err.message, true);
      }
    };
  </script>
</body>
</html>
