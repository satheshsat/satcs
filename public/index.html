<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Free Job Search Platform for job seekers and employers">
  <title>JobBoard - Find Jobs & Talent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Jobs</a></li>
          <li class="nav-item" id="navPostJob"><a class="nav-link" href="post-job.html">Post Job</a></li>
          <li class="nav-item" id="navMyJobs"><a class="nav-link" href="my-jobs.html">My Jobs</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item" id="navLogin"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item" id="navRegister"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item dropdown d-none" id="navUser">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" id="userName">User</a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#" id="btnLogout">Logout</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="text-center py-5 bg-white rounded-3 shadow-sm mb-4">
      <h1 class="display-5 fw-bold text-primary">Find Your Next Opportunity</h1>
      <p class="lead text-muted">Search jobs or post openings for your company.</p>
      <div class="row g-2 justify-content-center mt-3">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="searchInput" placeholder="Job title, company, or keyword">
            <button class="btn btn-primary" id="btnSearch">Search</button>
          </div>
        </div>
        <div class="col-auto">
          <select class="form-select" id="filterType">
            <option value="">All types</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="internship">Internship</option>
          </select>
        </div>
      </div>
    </div>

    <div id="alertBox" class="alert d-none" role="alert"></div>
    <div id="jobList" class="row g-3">
      <!-- Jobs loaded here -->
    </div>
    <nav id="pagination" class="mt-4 d-flex justify-content-center"></nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 8;

    function renderNav() {
      const user = getCurrentUser();
      if (user) {
        document.getElementById('navLogin').classList.add('d-none');
        document.getElementById('navRegister').classList.add('d-none');
        document.getElementById('navUser').classList.remove('d-none');
        document.getElementById('userName').textContent = user.name;
        if (user.role !== 'employer') {
          document.getElementById('navPostJob').classList.add('d-none');
          document.getElementById('navMyJobs').classList.add('d-none');
        }
      } else {
        document.getElementById('navPostJob').classList.add('d-none');
        document.getElementById('navMyJobs').classList.add('d-none');
      }
      document.getElementById('btnLogout').onclick = () => { clearAuth(); window.location.href = 'index.html'; };
    }

    function buildJobCard(job) {
      return `
        <div class="col-md-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <span class="badge bg-secondary mb-2">${job.type || 'full-time'}</span>
              <h5 class="card-title">${escapeHtml(job.title)}</h5>
              <p class="card-text text-muted small mb-1"><i class="bi bi-building"></i> ${escapeHtml(job.company)}</p>
              ${job.location ? `<p class="card-text text-muted small mb-2"><i class="bi bi-geo-alt"></i> ${escapeHtml(job.location)}</p>` : ''}
              <p class="card-text small">${escapeHtml((job.description || '').slice(0, 100))}...</p>
              <a href="job-detail.html?id=${job._id}" class="btn btn-outline-primary btn-sm">View</a>
            </div>
          </div>
        </div>`;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadJobs(page = 1) {
      currentPage = page;
      const q = document.getElementById('searchInput').value.trim();
      const type = document.getElementById('filterType').value;
      const params = new URLSearchParams({ page, limit: pageSize });
      if (q) params.set('q', q);
      if (type) params.set('type', type);
      try {
        const { jobs, total, pages } = await api('/jobs?' + params);
        const listEl = document.getElementById('jobList');
        listEl.innerHTML = jobs.length ? jobs.map(buildJobCard).join('') : '<div class="col-12 text-center py-5 text-muted">No jobs found.</div>';
        let paginationHtml = '';
        for (let i = 1; i <= Math.min(pages, 10); i++) {
          paginationHtml += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
        }
        document.getElementById('pagination').innerHTML = pages > 1 ? `<ul class="pagination">${paginationHtml}</ul>` : '';
        document.getElementById('pagination').querySelectorAll('[data-page]').forEach(a => {
          a.onclick = e => { e.preventDefault(); loadJobs(parseInt(a.dataset.page)); };
        });
      } catch (e) {
        showAlert('alertBox', e.message, true);
        document.getElementById('jobList').innerHTML = '<div class="col-12 text-center py-5 text-danger">Failed to load jobs.</div>';
      }
    }

    renderNav();
    loadJobs();
    document.getElementById('btnSearch').onclick = () => loadJobs(1);
    document.getElementById('searchInput').onkeypress = e => { if (e.key === 'Enter') loadJobs(1); };
    document.getElementById('filterType').onchange = () => loadJobs(1);
  </script>
</body>
</html>
