<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Jobs - JobBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Jobs</a>
        <a class="nav-link" href="post-job.html">Post Job</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h4 class="mb-4">My Posted Jobs</h4>
    <div id="alertBox" class="alert d-none" role="alert"></div>
    <div id="jobList"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!redirectIfNotLoggedIn() || !redirectIfNotEmployer()) {}
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    async function loadMyJobs() {
      try {
        const { jobs } = await api('/jobs/my/posted');
        const listEl = document.getElementById('jobList');
        if (!jobs.length) {
          listEl.innerHTML = '<div class="card"><div class="card-body text-center text-muted py-5">You have not posted any jobs. <a href="post-job.html">Post your first job</a>.</div></div>';
          return;
        }
        listEl.innerHTML = jobs.map(job => `
          <div class="card mb-3 shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                  <span class="badge bg-secondary">${job.type || 'full-time'}</span>
                  <h5 class="card-title mt-2">${escapeHtml(job.title)}</h5>
                  <p class="text-muted mb-1">${escapeHtml(job.company)} ${job.location ? ' · ' + escapeHtml(job.location) : ''}</p>
                  <small class="text-muted">Posted ${formatDate(job.createdAt)}</small>
                </div>
                <div>
                  <a href="job-detail.html?id=${job._id}" class="btn btn-outline-primary btn-sm me-1">View</a>
                  <button class="btn btn-outline-danger btn-sm" data-id="${job._id}">Delete</button>
                </div>
              </div>
            </div>
          </div>
        `).join('');
        listEl.querySelectorAll('[data-id]').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Delete this job?')) return;
            try {
              await api('/jobs/' + btn.dataset.id, { method: 'DELETE' });
              loadMyJobs();
              showAlert('alertBox', 'Job deleted.');
            } catch (e) {
              showAlert('alertBox', e.message, true);
            }
          };
        });
      } catch (e) {
        document.getElementById('jobList').innerHTML = '<div class="alert alert-danger">Failed to load jobs.</div>';
        showAlert('alertBox', e.message, true);
      }
    }
    loadMyJobs();
  </script>
</body>
</html>
