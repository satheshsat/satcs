<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - JobBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">JobBoard</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body p-4">
            <h4 class="card-title mb-4">Create Account</h4>
            <div id="alertBox" class="alert d-none" role="alert"></div>
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="name" required placeholder="John Doe">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required placeholder="you@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">Password (min 6 characters)</label>
                <input type="password" class="form-control" name="password" required minlength="6">
              </div>
              <div class="mb-3">
                <label class="form-label">I am a</label>
                <select class="form-select" name="role" required>
                  <option value="employee">Job Seeker (Employee)</option>
                  <option value="employer">Employer (Post jobs)</option>
                </select>
              </div>
              <div class="mb-3 d-none" id="companyGroup">
                <label class="form-label">Company Name</label>
                <input type="text" class="form-control" name="company" placeholder="Acme Inc.">
              </div>
              <div class="mb-3">
                <label class="form-label">Phone (optional)</label>
                <input type="text" class="form-control" name="phone" placeholder="+1 234 567 8900">
              </div>
              <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="mt-3 mb-0 text-center text-muted small">Already have an account? <a href="login.html">Login</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.querySelector('[name=role]').onchange = function() {
      document.getElementById('companyGroup').classList.toggle('d-none', this.value !== 'employer');
    };
    if (getToken()) window.location.href = 'index.html';
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        name: fd.get('name'),
        email: fd.get('email'),
        password: fd.get('password'),
        role: fd.get('role'),
        phone: fd.get('phone') || ''
      };
      if (fd.get('role') === 'employer') payload.company = fd.get('company') || '';
      try {
        const { token, user } = await api('/auth/register', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        setAuth(token, user);
        window.location.href = 'index.html';
      } catch (err) {
        showAlert('alertBox', err.message, true);
      }
    };
  </script>
</body>
</html>
